<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — Page Not Found | Rayyan Mridha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .error-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 60px 10%;
      }
      .error-code {
        font-size: 150px;
        font-weight: 700;
        color: #5580af;
        line-height: 1;
        letter-spacing: -4px;
      }
      .error-title {
        font-size: 36px;
        font-weight: 600;
        color: #fff;
        margin: 10px 0 20px;
      }
      .error-message {
        color: #ababab;
        font-size: 16px;
        max-width: 500px;
        line-height: 1.7;
        margin-bottom: 40px;
      }
      .error-page nav ul li a::after {
        display: none;
      }
      @media (max-width: 600px) {
        .error-code { font-size: 90px; letter-spacing: -2px; }
        .error-title { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="container">
        <nav>
          <img src="images/header_logo.png" class="logo" alt="Rayyan Mridha">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#working-on">Now</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="index.html#contact">Contact</a></li>
          </ul>
        </nav>
      </div>
      <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="button">Go Home</a>
      </div>
    </div>
  </body>
</html>
